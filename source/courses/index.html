<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习笔记 - GJZ's Blog</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background-image: url('/images/web_background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #333;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        .breadcrumb {
            font-size: 14px;
            color: #666;
            margin-bottom: 40px;
        }

        .breadcrumb a {
            color: #E2852E;
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .section-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 60px 40px;
            border-radius: 20px;
            margin-bottom: 60px;
            border: 1px solid rgba(226, 133, 46, 0.15);
            box-shadow: 0 8px 32px rgba(226, 133, 46, 0.1);
        }

        .section-title {
            font-size: 48px;
            font-weight: 800;
            color: #E2852E;
            margin-bottom: 16px;
        }

        .section-desc {
            font-size: 18px;
            color: #666;
            line-height: 1.8;
            margin-bottom: 24px;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 60px;
        }

        .course-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid rgba(226, 133, 46, 0.15);
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(226, 133, 46, 0.08);
        }

        .course-card:hover {
            transform: translateY(-8px);
            border-color: rgba(226, 133, 46, 0.4);
            box-shadow: 0 16px 48px rgba(226, 133, 46, 0.2);
        }

        .course-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .course-title {
            font-size: 20px;
            font-weight: 700;
            color: #333;
            margin-bottom: 12px;
        }

        .course-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .course-meta {
            display: inline-block;
            background: linear-gradient(135deg, #E2852E, #F5C857);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 16px;
        }

        .btn {
            display: inline-block;
            padding: 10px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #E2852E, #F5C857);
            color: white;
        }

        .btn-primary:hover {
            transform: translateX(4px);
            box-shadow: 0 6px 16px rgba(226, 133, 46, 0.4);
        }

        .btn-back {
            background: transparent;
            color: #E2852E;
            border: 2px solid #E2852E;
            margin-top: 30px;
        }

        .btn-back:hover {
            background: rgba(226, 133, 46, 0.1);
        }

        @media (max-width: 768px) {
            .section-title {
                font-size: 32px;
            }

            .courses-grid {
                grid-template-columns: 1fr;
            }

            .section-header {
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="breadcrumb">
            <a href="/">首页</a> → 学习笔记
        </div>

        <div class="section-header">
            <h1 class="section-title">📖 学习笔记</h1>
            <p class="section-desc">记录我的学习之旅，分享在编程、计算机科学和软件工程领域的学习成果。这里包含系统的学习笔记、实践总结和知识整理。</p>
        </div>

        <div class="courses-grid">
            <div class="course-card">
                <div class="course-icon">🎯</div>
                <div class="course-title">学习路线</div>
                <p class="course-desc">系统的技术学习路径规划和进阶指南</p>
                <span class="course-meta">完整路线</span>
                <a href="/" class="btn btn-primary">查看路线</a>
            </div>

            <div class="course-card">
                <div class="course-icon">💻</div>
                <div class="course-title">编程笔记</div>
                <p class="course-desc">各种编程语言和框架的学习笔记</p>
                <span class="course-meta">多语言</span>
                <a href="/" class="btn btn-primary">阅读笔记</a>
            </div>

            <div class="course-card">
                <div class="course-icon">🏗️</div>
                <div class="course-title">架构设计</div>
                <p class="course-desc">系统设计模式和架构最佳实践总结</p>
                <span class="course-meta">进阶内容</span>
                <a href="/" class="btn btn-primary">深入学习</a>
            </div>

            <div class="course-card">
                <div class="course-icon">📊</div>
                <div class="course-title">算法数据结构</div>
                <p class="course-desc">算法问题解析和数据结构详解</p>
                <span class="course-meta">技能提升</span>
                <a href="/" class="btn btn-primary">查看内容</a>
            </div>
        </div>

        <a href="/" class="btn btn-back">← 返回首页</a>
    </div>
</body>
</html>
